<html lang="en">
<head>

<body>
    <header>
        <h1>Formulario</h1>

    <nav>
    <a href="/">Inicio</a>

    <h2>Nombre</h2>
    <form action="/procesar" method="POST">
        <label for="Nombre">Nombre:</label>
        <input type="text" id="Nombre" name="name">

        <button type="submit">Enviar</button>
        <button type="reset">Vaciar</button>

<h2>Correo Electrónico</h2>

        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" name="email">

        <button type="submit">Enviar</button>
        <button type="reset">Vaciar</button>

        <h2>Contraseña</h2>

       <label for="password">Contraseña:</label>
       <input type="password" id="password" name="password">
        </div>
        
<h2>Elija sus hobbies</h2>

        <div class="container"
        <label>
            <input type="checkbox" name="hobby" value="programar">Programar
            <input type="checkbox" name="hobby" value="deporte">Deporte
            <input type="checkbox" name="hobby" value="musica">Practicar deportes
            <input type="checkbox" name="hobby" value="musica">Otros

    </label>

<h2>Elija su género</h2>

    <div class="container">
            <select name="Seleccione su Genero">
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
             </select>

<h2>Elija su nacionalidad</h2>

    <div class="container">
            <select name="Nacionalidad">
                <option value="Uruguay">Uruguay</option>
                <option value="Argentina">Argentina</option>
                <option value="Brasil">Brasil</option>
                <option value="Paraguay">Paraguay</option>
             </select>

             <button type="submit">Enviar</button>
             <button type="reset">Vaciar</button>
    </body>
